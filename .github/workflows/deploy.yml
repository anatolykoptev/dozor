name: Deploy (manual)

# Manual deploy escape hatch. Normal auto-deploy now happens ONLY on release
# (the gated `deploy` job in release-please.yml). Use this to deploy an arbitrary
# ref without cutting a release — e.g. an emergency hotfix off main, or to
# re-deploy a specific tag. Shares the reusable _deploy.yml logic.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build + deploy"
        required: false
        default: main

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit
