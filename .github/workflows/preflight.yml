name: preflight

# Pre-merge build/test gate. dozor is a PUBLIC repo → free GitHub-hosted arm64
# runners (ubuntu-24.04-arm: free unlimited for public repos, arm64 = krolik
# prod parity). Gate = `make preflight` (gofmt + vet + build + test).

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; cancel in-flight if a new push arrives.
concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOWORK: "off"

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: make preflight
        run: make preflight
