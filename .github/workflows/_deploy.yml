name: _deploy

# Reusable deploy job — the single place that builds dozor and ships it to krolik.
# Called by:
#   - release-please.yml  → auto-deploy on release (gated on release_created)
#   - deploy.yml          → manual deploy of an arbitrary ref (workflow_dispatch)
# Never triggered directly. Keeping the SSH/install logic here (not duplicated)
# means one place to audit the deploy key + sudo install path.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build + deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    env:
      BINARY_NAME: dozor
      INSTALL_DIR: /home/krolik/.local/bin
      SERVICE_USER: krolik
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0  # `make build` derives the version via `git describe`

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build (version-stamped via make)
        run: make build  # LDFLAGS: -X main.version=$(git describe --tags) → the tag on a release

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p "$SSH_PORT" -T 10 "$SSH_HOST" >> ~/.ssh/known_hosts

          cat > ~/.ssh/config << EOF
          Host server
            HostName $SSH_HOST
            Port $SSH_PORT
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
          EOF

      - name: Deploy binary
        run: |
          scp $BINARY_NAME server:/tmp/$BINARY_NAME
          ssh server "
            sudo systemctl --user -M $SERVICE_USER@ stop $BINARY_NAME || true
            sudo install -o $SERVICE_USER -g $SERVICE_USER -m 0755 /tmp/$BINARY_NAME $INSTALL_DIR/$BINARY_NAME
            sudo systemctl --user -M $SERVICE_USER@ start $BINARY_NAME
            rm /tmp/$BINARY_NAME
          "

      - name: Health check
        run: |
          sleep 2
          ssh server "sudo systemctl --user -M $SERVICE_USER@ is-active $BINARY_NAME"
          ssh server "curl -sf http://localhost:8765/health"

      - name: Show status
        if: always()
        run: |
          ssh server "sudo systemctl --user -M $SERVICE_USER@ status $BINARY_NAME --no-pager" || true
