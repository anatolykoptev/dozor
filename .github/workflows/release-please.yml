name: release-please

# Conventional-commit-driven versioning (tag + GitHub release + changelog) AND
# deploy-on-release. The release-please job is lightweight (free tier). When it
# cuts a release, the gated `deploy` job (below) builds the tagged binary and
# ships it to krolik — this is the ONLY path that auto-deploys dozor now
# (deploy.yml is manual-only). Deploy is folded in HERE rather than a separate
# `on: release` workflow because a GITHUB_TOKEN-created release does NOT trigger
# other workflows (GitHub's recursion guard) — an `on: release` deploy would
# silently never fire. `release_created` gating keeps it in this one job graph.
#
# Release BINARIES (downloadable cross-arch assets) are still built LOCALLY on
# krolik by ~/bin/goreleaser-release-local.sh (heavy GoReleaser cross-compile
# must not burn PAID GHA minutes). Do NOT add a goreleaser job here.
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Auto-deploy ONLY when a release was just cut (recursion-guard-safe, see header).
  deploy:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/_deploy.yml
    with:
      ref: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
